<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Site Removed</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    min-height:100vh;
    background:#0f1117;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Segoe UI',sans-serif;
    color:#f0f2f8;
    overflow:hidden;
  }
  .particles{position:fixed;inset:0;pointer-events:none;z-index:0;}
  .particle{
    position:absolute;
    border-radius:50%;
    background:rgba(239,68,68,0.4);
    animation:float linear infinite;
  }
  @keyframes float{
    0%{transform:translateY(110vh) scale(0);opacity:0;}
    10%{opacity:1;}
    90%{opacity:0.6;}
    100%{transform:translateY(-10vh) scale(1.5);opacity:0;}
  }
  .glow{
    position:fixed;inset:0;z-index:0;
    background:radial-gradient(ellipse at 50% 50%, rgba(239,68,68,0.08) 0%, transparent 70%);
    animation:pulse-glow 3s ease-in-out infinite;
  }
  @keyframes pulse-glow{0%,100%{opacity:0.5;}50%{opacity:1;}}

  .box{
    position:relative;z-index:1;
    text-align:center;
    padding:52px 44px;
    background:rgba(28,35,51,0.97);
    border:1px solid rgba(239,68,68,0.3);
    border-radius:24px;
    max-width:440px;
    width:90%;
    box-shadow:0 0 60px rgba(239,68,68,0.12),0 20px 60px rgba(0,0,0,0.5);
    animation:card-in 0.7s cubic-bezier(0.34,1.56,0.64,1) forwards;
  }
  @keyframes card-in{
    from{opacity:0;transform:scale(0.85) translateY(30px);}
    to{opacity:1;transform:scale(1) translateY(0);}
  }

  .icon-wrap{
    width:80px;height:80px;border-radius:50%;
    background:rgba(239,68,68,0.12);
    border:2px solid rgba(239,68,68,0.35);
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 22px;
    animation:icon-pulse 2s ease-in-out infinite;
    font-size:2.2rem;
  }
  @keyframes icon-pulse{
    0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,0.4);}
    50%{box-shadow:0 0 0 18px rgba(239,68,68,0);}
  }

  .badge{
    display:inline-block;
    font-size:0.65rem;font-weight:800;letter-spacing:0.1em;text-transform:uppercase;
    padding:4px 12px;border-radius:20px;
    background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.3);color:#ef4444;
    margin-bottom:18px;
    animation:fade-in 0.5s 0.3s ease both;
  }
  h1{font-size:1.55rem;font-weight:800;margin-bottom:12px;animation:fade-in 0.5s 0.4s ease both;}
  .sub{font-size:0.82rem;color:#7b8ab8;line-height:1.7;margin-bottom:24px;animation:fade-in 0.5s 0.5s ease both;}
  .divider{width:60px;height:2px;background:linear-gradient(90deg,transparent,rgba(239,68,68,0.5),transparent);margin:0 auto 22px;animation:fade-in 0.5s 0.55s ease both;}

  .ticker-wrap{
    overflow:hidden;
    background:rgba(239,68,68,0.06);
    border-top:1px solid rgba(239,68,68,0.15);
    border-bottom:1px solid rgba(239,68,68,0.15);
    padding:9px 0;margin:0 -44px 24px;
    animation:fade-in 0.5s 0.6s ease both;
  }
  .ticker{
    display:flex;white-space:nowrap;
    animation:ticker 12s linear infinite;
    font-size:0.7rem;color:rgba(239,68,68,0.75);
    font-weight:700;letter-spacing:0.07em;text-transform:uppercase;
  }
  .ticker span{padding:0 28px;}
  @keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}

  .contact{
    display:flex;align-items:center;justify-content:center;gap:14px;
    background:rgba(239,68,68,0.06);
    border:1px solid rgba(239,68,68,0.2);
    border-radius:14px;padding:16px 22px;
    text-decoration:none;
    transition:background 0.2s,transform 0.15s,box-shadow 0.2s;
    animation:fade-in 0.5s 0.75s ease both;
    cursor:pointer;
  }
  .contact:hover{background:rgba(239,68,68,0.13);transform:translateY(-3px);box-shadow:0 8px 24px rgba(239,68,68,0.15);}
  .contact-icon{font-size:1.5rem;flex-shrink:0;animation:ring 2.5s ease-in-out infinite;}
  @keyframes ring{
    0%,90%,100%{transform:rotate(0deg);}
    92%{transform:rotate(-15deg);}
    94%{transform:rotate(15deg);}
    96%{transform:rotate(-10deg);}
    98%{transform:rotate(10deg);}
  }
  .contact-info{text-align:left;}
  .contact-label{font-size:0.68rem;color:#7b8ab8;font-weight:600;text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px;}
  .contact-name{font-size:0.92rem;font-weight:800;color:#f0f2f8;}
  .contact-num{font-size:0.85rem;color:#ef4444;font-weight:700;margin-top:2px;}

  .footer{margin-top:22px;font-size:0.68rem;color:#4a5580;animation:fade-in 0.5s 0.9s ease both;}

  @keyframes fade-in{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
</style>
</head>
<body>

<div class="glow"></div>
<div class="particles" id="particles"></div>

<div class="box">
  <div class="badge">⚠ Important Notice</div>

  <div class="icon-wrap">🚫</div>

  <h1>Site Has Been Removed</h1>

  <p class="sub">
    This site has been taken down and is<br>
    no longer available for access.
  </p>

  <div class="divider"></div>

  <div class="ticker-wrap">
    <div class="ticker">
      <span>Site Removed by Herath</span>
      <span>•</span>
      <span>Contact: 0773 552 525</span>
      <span>•</span>
      <span>Site Removed by Herath</span>
      <span>•</span>
      <span>Contact: 0773 552 525</span>
      <span>•</span>
    </div>
  </div>

  <a class="contact" href="tel:0773552525">
    <div class="contact-icon">📞</div>
    <div class="contact-info">
      <div class="contact-label">Removed by</div>
      <div class="contact-name">Herath</div>
      <div class="contact-num">0773 552 525</div>
    </div>
  </a>

  <div class="footer">© </div>
</div>

<script>
  const c = document.getElementById('particles');
  for(let i = 0; i < 40; i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 4;
    p.style.cssText = `
      left:${Math.random()*100}%;
      width:${size}px;height:${size}px;
      animation-duration:${5 + Math.random()*9}s;
      animation-delay:${Math.random()*7}s;
      opacity:${0.2 + Math.random()*0.5};
    `;
    c.appendChild(p);
  }
</script>
</body>
</html>
